# Veldra — full self-host stack. One command runs everything:
#   make up         (or: docker compose -f deploy/docker-compose.yml up --build)
# Brings up postgres+pgvector, redis, minio, and the app (Vue UI + FastAPI API)
# on http://localhost:8000. Requires Ollama running on the host (default provider).
name: veldra

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: veldra
      POSTGRES_PASSWORD: veldra
      POSTGRES_DB: veldra
    ports:
      # 5433 on the host to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veldra -d veldra"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: veldra
      MINIO_ROOT_PASSWORD: veldrasecret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the documents bucket on first boot.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 veldra veldrasecret;
      mc mb --ignore-existing local/veldra-documents;
      mc anonymous set none local/veldra-documents;
      exit 0;
      "

  # The Veldra app: serves the Vue UI + FastAPI API. `docker compose up` runs the lot.
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      # In-network service addresses (override whatever .env has for host-mode dev).
      DATABASE_URL: postgresql://veldra:veldra@postgres:5432/veldra
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      VELDRA_API_HOST: "0.0.0.0"
      # Reach the host's Ollama from inside the container.
      VELDRA_OLLAMA_BASE_URL: http://host.docker.internal:11434
      VELDRA_QDRANT_URL: http://qdrant:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Optional alternative vector store. Enable with: --profile qdrant
  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  redisdata:
  miniodata:
  qdrantdata:
