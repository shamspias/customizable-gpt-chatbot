# Local self-host stack for the Loom MVP.
#   task up    -> postgres+pgvector, redis, minio
# The app (services/app) and web (apps/web) run on the host via `task dev`
# during development; a containerized app target is added later.
name: loom

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: loom
      POSTGRES_DB: loom
    ports:
      # 5433 on the host to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loom -d loom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: loom
      MINIO_ROOT_PASSWORD: loomsecret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the documents bucket on first boot.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 loom loomsecret;
      mc mb --ignore-existing local/loom-documents;
      mc anonymous set none local/loom-documents;
      exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
