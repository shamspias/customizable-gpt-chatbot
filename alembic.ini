# Alembic configuration. The database URL and target metadata are supplied by
# deploy/alembic/env.py from veldra_app settings, so no sqlalchemy.url is hard-coded
# here. Run migrations with `python -m veldra_app.db migrate` (idempotent, used on
# boot) or directly with `alembic upgrade head` / `alembic revision --autogenerate`.

[alembic]
script_location = deploy/alembic
prepend_sys_path = .
path_separator = os
# Timestamped, ordered revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
